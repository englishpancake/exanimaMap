[AppSettings]
full_window_screen = 1
; Only uncomment and change this path if your Exanima saves are not in the default location.
;pathToExanimaSaves = C:\\Users\\UserName\\AppData\\Roaming\\Exanima
; Enable quick save (1 = on, 0 = off)
quickSave = 1
; Enable exploration brush trail (1 = on, 0 = off). Can also be toggled in-game with F8.
brush_enabled = 1
; Exploration brush size in pixels (1 = hair-thin, 2 = fine, 5 = medium, 18 = thick)
brush_radius = 2
; Window opacity 0-100 (0 = invisible, 100 = fully opaque)
opacity = 60
; Exploration trail colour as hex RGB (e.g. E52626 = red, 26E526 = green, 2626E5 = blue, 000000 = black)
brush_color = AA1111
; Player marker (cursor) colour. "default" keeps the base exanima metallic colour.
; Same format as brush_color, e.g. FF0000, just does a flat recolour. Applied at startup.
cursor_color = default
; Rotation behaviour: 0 = map stays static and the player marker points where the camera is looking
; (default); 1 = the minimap rotates to the camera and the marker stays pointing up
; Beware that this can make the exploration trail a bit laggy if toggled on
rotate_map = 0

[MemoryAddresses]
offset_x_ptr = 0x48BCC0
offset_y_ptr = 0x48BCC8
offset_lvl_ptr = 0x2DA030
rotationx_ptr = 0x489D80
rotationy_ptr = 0x489CE0

